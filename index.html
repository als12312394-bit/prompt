<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>🔐 프롬프트 뱅크</title>
<style>
:root{
  --bg:#0d0d1f;--sb:#13132b;--card:#1a1a35;--border:#2a2a50;
  --accent:#7c6af7;--accent2:#4ecdc4;--text:#dde0f5;--muted:#7070a0;
  --code:#0a0a20;--hh:56px;--sw:252px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;overflow:hidden}

/* ── 헤더 ── */
header{
  position:fixed;top:0;left:0;right:0;height:var(--hh);z-index:300;
  background:rgba(13,13,31,.96);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;padding:0 14px;
}
.logo{font-size:.95rem;font-weight:700;color:var(--accent);white-space:nowrap;flex-shrink:0}
.search-wrap{flex:1;position:relative;min-width:0}
#search{
  width:100%;padding:7px 12px 7px 34px;border-radius:20px;
  border:1px solid var(--border);background:var(--card);
  color:var(--text);font-size:.85rem;outline:none;transition:border-color .2s;
}
#search:focus{border-color:var(--accent)}
.search-icon{
  position:absolute;left:10px;top:50%;transform:translateY(-50%);
  color:var(--muted);font-size:.85rem;pointer-events:none;
}
#result-count{font-size:.75rem;color:var(--muted);white-space:nowrap;flex-shrink:0}
#menu-btn{
  display:none;background:none;border:none;color:var(--text);
  font-size:1.3rem;cursor:pointer;padding:4px;flex-shrink:0;
}

/* ── 레이아웃 ── */
.layout{
  display:flex;margin-top:var(--hh);
  height:calc(100vh - var(--hh));overflow:hidden;position:relative;
}

/* ── 사이드바 ── */
aside{
  width:var(--sw);min-width:var(--sw);background:var(--sb);
  border-right:1px solid var(--border);overflow-y:auto;
  padding:10px 8px;display:flex;flex-direction:column;gap:2px;
  transition:transform .25s ease;z-index:200;
}
.sec-hdr{
  font-size:.65rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  padding:12px 8px 4px;margin-top:4px;border-top:1px solid var(--border);
  opacity:.85;
}
.sec-hdr:first-of-type{border-top:none;margin-top:0}
.cat-btn{
  display:flex;align-items:center;justify-content:space-between;
  width:100%;padding:7px 10px;border-radius:7px;border:none;
  background:transparent;color:var(--text);font-size:.82rem;
  cursor:pointer;transition:background .12s;text-align:left;
  gap:4px;line-height:1.3;
}
.cat-btn:hover{background:var(--border)}
.cat-btn.active{background:var(--accent);color:#fff}
.cnt{
  font-size:.68rem;background:rgba(255,255,255,.12);
  padding:1px 6px;border-radius:10px;flex-shrink:0;white-space:nowrap;
}
.cat-btn.active .cnt{background:rgba(255,255,255,.25)}

/* 오버레이 */
#overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:199;
}

/* ── 메인 ── */
main{flex:1;overflow-y:auto;padding:14px;min-width:0}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}

/* ── 카드 ── */
.card{
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:13px;display:flex;flex-direction:column;gap:8px;
  transition:border-color .18s,box-shadow .18s;
}
.card:hover{border-color:var(--accent);box-shadow:0 4px 18px rgba(124,106,247,.15)}
.card-top{display:flex;align-items:flex-start;gap:8px}
.card-title{font-weight:700;font-size:.88rem;line-height:1.4;color:#fff;flex:1;min-width:0}
.badges{display:flex;flex-wrap:wrap;gap:3px;flex-shrink:0;max-width:120px}
.badge{
  font-size:.63rem;padding:2px 7px;border-radius:10px;
  background:#22224a;color:var(--accent2);border:1px solid #33335a;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:115px;
}
.badge.src{color:#f7a66a;border-color:#4a3020;background:#2a1a10}
.card-desc{font-size:.76rem;color:var(--muted);line-height:1.5}
.code-wrap{
  background:var(--code);border-radius:7px;border:1px solid #1e1e42;overflow:hidden;
}
.code-wrap pre{
  padding:10px;font-size:.73rem;line-height:1.6;
  overflow-y:auto;max-height:160px;white-space:pre-wrap;word-break:break-word;
  color:#b8b8e8;font-family:'Cascadia Code','Fira Code','Consolas',monospace;
}
.copy-btn{
  display:flex;align-items:center;justify-content:center;gap:5px;
  width:100%;padding:8px;border-radius:7px;min-height:40px;
  border:1px solid var(--border);background:transparent;
  color:var(--accent);font-size:.8rem;cursor:pointer;
  transition:all .15s;font-weight:500;
}
.copy-btn:hover,.copy-btn:active{background:var(--accent);color:#fff;border-color:var(--accent)}
.copy-btn.ok{background:var(--accent2);color:#0a2a20;border-color:var(--accent2)}

/* 빈 상태 */
.empty{
  grid-column:1/-1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:80px 0;color:var(--muted);gap:12px;text-align:center;
}
.empty .ico{font-size:2.5rem}

/* 로딩 */
#loading{
  position:fixed;inset:0;background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:16px;z-index:999;
}
.spinner{
  width:40px;height:40px;border:3px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* 스크롤바 */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#2e2e5a;border-radius:3px}

/* ════ 반응형 ════ */
@media(max-width:768px){
  :root{--hh:52px;--sw:265px}
  #menu-btn{display:block}
  aside{
    position:fixed;top:var(--hh);bottom:0;left:0;
    transform:translateX(-100%);
    border-right:1px solid var(--accent);
    box-shadow:4px 0 24px rgba(0,0,0,.6);
  }
  aside.open{transform:translateX(0)}
  #overlay{display:block}
  #overlay.visible{opacity:1;pointer-events:auto}
  #overlay:not(.visible){opacity:0;pointer-events:none}
  #grid{grid-template-columns:1fr;gap:10px}
  main{padding:10px}
  .card{padding:12px}
  .code-wrap pre{max-height:120px}
  .logo{font-size:.85rem}
  #result-count{display:none}
  header{padding:0 10px;gap:8px}
}
@media(min-width:769px) and (max-width:1024px){
  :root{--sw:200px}
  #grid{grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div style="color:var(--muted);font-size:.9rem">데이터 로딩 중...</div>
</div>

<header>
  <button id="menu-btn" onclick="toggleSidebar()" aria-label="메뉴">☰</button>
  <div class="logo">🔐 프롬프트 뱅크</div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input id="search" type="search" placeholder="제목, 카테고리, 본문 검색..." oninput="onSearch()" autocomplete="off">
  </div>
  <span id="result-count"></span>
</header>

<div id="overlay" onclick="closeSidebar()"></div>

<div class="layout">
  <aside id="sidebar">
    <!-- 사이드바: JS가 동적으로 생성 -->
  </aside>
  <main><div id="grid"></div></main>
</div>

<script>
// ════════════════════════════════════════════════════
//  ENGINE — index.html은 이 로직만 담당한다.
//  데이터는 data.js (window.PROMPT_DATA)에서 주입됨
// ════════════════════════════════════════════════════

let ALL = [];          // 전체 프롬프트 배열
let activeSec = '__ALL__';
let activeCat = '__ALL__';
let searchQ   = '';

function esc(s){
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getFiltered(){
  const q = searchQ.toLowerCase();
  return ALL.filter(p => {
    const mS = activeSec === '__ALL__' || p.section === activeSec;
    const mC = activeCat === '__ALL__' || p.category === activeCat;
    const mQ = !q
      || (p.title   || '').toLowerCase().includes(q)
      || (p.category|| '').toLowerCase().includes(q)
      || (p.content || '').toLowerCase().includes(q)
      || (p.desc    || '').toLowerCase().includes(q)
      || (p.tags    || []).some(t => t.toLowerCase().includes(q));
    return mS && mC && mQ;
  });
}

function buildSidebar(){
  const secMap = {};
  ALL.forEach(p => {
    const sec = p.section || '기타';
    const cat = p.category || '기타';
    if(!secMap[sec]) secMap[sec] = {};
    secMap[sec][cat] = (secMap[sec][cat] || 0) + 1;
  });
  let html = `<button class="cat-btn active" data-sec="__ALL__" data-cat="__ALL__" onclick="filterCat(this)">✨ 전체 <span class="cnt">${ALL.length.toLocaleString()}</span></button>`;
  Object.keys(secMap).sort().forEach(sec => {
    const cats = secMap[sec];
    const total = Object.values(cats).reduce((a,b)=>a+b,0);
    html += `<div class="sec-hdr">${esc(sec)} <span class="cnt" style="font-weight:40">${total.toLocaleString()}</span></div>`;
    Object.keys(cats).sort().forEach(cat => {
      html += `<button class="cat-btn" data-sec="${esc(sec)}" data-cat="${esc(cat)}" onclick="filterCat(this)">${esc(cat)}<span class="cnt">${cats[cat]}</span></button>`;
    });
  });
  document.getElementById('sidebar').innerHTML = html;
}

function render(){
  const filtered = getFiltered();
  document.getElementById('result-count').textContent = filtered.length.toLocaleString() + '개';
  const grid = document.getElementById('grid');
  if(!filtered.length){
    grid.innerHTML = `<div class="empty"><div class="ico>🔍</div><div>검색 결과가없습니다</div></div>`;
    return;
  }
  grid.innerHTML = filtered.map((p,1) => {
    const tags = (p.tags || []).map(t => `<span class="badge">${esc(t)}</span>`).join('');
    return `<div class="card"><div class="card-top"><div class="card-title">${esc(p.title||'제목 없음')}</div><div class="badges"><span class="badge">${esc(p.category||'')}</span>${p.section?`<span class="badge src">${esc(p.section.replace(/[^\w\s글-힝]/gu,'').trim())}</span>`:''}</div></div>${p.desc?`<div class="card-desc">${esc(p.desc)}</div>`:''}${tags?`<div style="display:flex;flex-wrap:wrap;gap:3px">${tags}</div>`:''}<div class="code-wrap"><pre><code>${esc(p.content||''논용 없음)')}</code></pre></div><button class="copy-btn" onclick="copyP(${1},this)">📋 복사하길</button></div>`;
  }).join('');
}

function filterCat(btn){
  activeSec = btn.dataset.sec;
  activeCat = btn.dataset.cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
  if(window.innerWidth <= 768) closeSidebar();
}

function onSearch(){
  searchQ = document.getElementById('search').value;
  render();
}

function copyP(idx,btn){
  const filtered = getFiltered();
  const text = filtered[idx]?.content||'';
  const done=()=>{const o=btn.innerHTML;btn.innerHTML='✅ 복사됨!';btn.classList.add('ok');setTimeout(()=>{btn.innerHTML=o;btn.classList.remove('ok')},2000)};
  if(navigator.clipboard){navigator.clipboard.writeText(text).then(done).catch(()=>fallback(text,done))}else{fallback(text,done)}
}
function fallback(text,cb){
  const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0;top:0;left:0';document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy')}catch(e){}document.body.removeChild(ta);cb();
}
function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('visible');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('visible');
}

function init(){
  if(typeof window.PROMPT_DATA === 'undefined'){
    document.getElementById('loading').innerHTML=`<div style="color:#f76a8a;font-size:1rem">⚠️ data.js 파일을 찾을 수 없습니다.</div><div style="color:var(--muted);font-size:.85rem;margin-top:8px">index.html과 같타 폴㍔에 data.js를 추가해주세요.</div>`;return;
  }
  ALL = window.PROMPT_DATA;
  buildSidebar();
  render();
  document.getElementById('loading').style.display='none';
}

(function loadData(){
  const script=document.createElement('script');script.src='data.js';script.onload=init;script.onerror=()=>{window.PROMPT_DATA=pwindow.__DEMO_DATA__||[];init()};document.head.appendChild(script);
})();
</script>
</body>
</html>
